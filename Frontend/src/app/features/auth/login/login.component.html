<main class="min-h-screen bg-surface flex items-center justify-center p-4 font-body">
  <div
    class="max-w-[1000px] w-full bg-surface-container-lowest rounded-[28px] shadow-xl overflow-hidden flex flex-col md:flex-row min-h-[600px]"
  >
    <div
      class="md:w-1/2 bg-secondary p-12 text-white flex flex-col justify-between relative overflow-hidden"
    >
      <div class="relative z-10">
        <h1 class="text-4xl font-manrope font-extrabold mb-4 leading-tight">
          EMERGENCIA VEHICULAR
        </h1>
        <p class="text-secondary-container text-lg opacity-90">
          Gestión inteligente para talleres mecánicos de alto rendimiento.
        </p>
      </div>

      <div class="relative z-10">
        <div class="flex items-center gap-3 mb-6">
          <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center">
            <span class="material-symbols-outlined">verified_user</span>
          </div>
          <div>
            <p class="font-bold">Acceso Seguro</p>
            <p class="text-sm opacity-80">Encriptación de datos de extremo a extremo.</p>
          </div>
        </div>
      </div>
      <div
        class="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full -mr-32 -mt-32 blur-3xl"
      ></div>
    </div>

    <div class="md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
      <div class="mb-10 text-center md:text-left">
        <h2 class="text-3xl font-manrope font-bold text-on-surface mb-2">Acceso Taller</h2>
        <p class="text-on-surface-variant">Ingresa tus credenciales para continuar</p>
      </div>

      <form class="space-y-6">
        <div class="space-y-2">
          <label class="text-sm font-semibold text-on-surface-variant ml-1"
            >Correo Electrónico</label
          >
          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl"
              >mail</span
            >
            <input
              type="email"
              placeholder="nombre@taller.com"
              class="w-full pl-12 pr-4 py-4 bg-surface-container-high border-none rounded-2xl focus:ring-2 focus:ring-primary/20 outline-none transition-all placeholder:text-on-surface-variant/50"
            />
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-semibold text-on-surface-variant ml-1">Contraseña</label>
          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl"
              >lock</span
            >
            <input
              type="password"
              placeholder="••••••••"
              class="w-full pl-12 pr-4 py-4 bg-surface-container-high border-none rounded-2xl focus:ring-2 focus:ring-primary/20 outline-none transition-all"
            />
          </div>
        </div>

        <button
          type="submit"
          class="w-full bg-primary text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary/30 hover:bg-primary/90 hover:-translate-y-0.5 transition-all active:scale-[0.98] flex items-center justify-center gap-2 mt-4"
        >
          Ingresar al Sistema
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
      </form>

      <p class="text-center mt-8 text-sm text-on-surface-variant">
        ¿No tienes cuenta?
        <a routerLink="/register" class="text-primary font-bold hover:underline cursor-pointer"
          >Regístrate aquí</a
        >
      </p>
    </div>
  </div>
</main>
